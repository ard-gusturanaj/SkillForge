openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SkillForge API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User profile operations
  - name: projects
    description: Project operations
  - name: collaborations
    description: Collaboration request operations
  - name: notifications
    description: Notification operations
  - name: bookmarks
    description: Bookmark operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: Search users by skills or name
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: skill
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
            default: 1
        - name: limit
          in: query
          schema:
            type: number
            default: 12
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"

  /users/{userId}:
    get:
      operationId: getUserById
      tags: [users]
      summary: Get user profile by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/profile:
    put:
      operationId: updateProfile
      tags: [users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: getProjects
      tags: [projects]
      summary: Get all projects with optional search/filter
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: tech
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [looking_for_team, active, completed]
        - name: page
          in: query
          schema:
            type: number
            default: 1
        - name: limit
          in: query
          schema:
            type: number
            default: 12
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectsListResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}:
    get:
      operationId: getProjectById
      tags: [projects]
      summary: Get project by ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Project deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/user/me:
    get:
      operationId: getMyProjects
      tags: [projects]
      summary: Get current user's projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User's projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /collaborations/request:
    post:
      operationId: createCollaborationRequest
      tags: [collaborations]
      summary: Request to join a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollaborationRequest"
      responses:
        "201":
          description: Request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollaborationRequest"
        "400":
          description: Already requested or member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /collaborations/requests/incoming:
    get:
      operationId: getIncomingRequests
      tags: [collaborations]
      summary: Get collaboration requests for owner's projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Incoming requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollaborationRequestDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /collaborations/requests/outgoing:
    get:
      operationId: getOutgoingRequests
      tags: [collaborations]
      summary: Get collaboration requests sent by current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Outgoing requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollaborationRequestDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /collaborations/requests/{requestId}/respond:
    put:
      operationId: respondToCollaborationRequest
      tags: [collaborations]
      summary: Accept or reject a collaboration request
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondToRequestBody"
      responses:
        "200":
          description: Request updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollaborationRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get current user's notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/{notificationId}/read:
    put:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/read-all:
    put:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All notifications marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookmarks:
    get:
      operationId: getBookmarks
      tags: [bookmarks]
      summary: Get current user's bookmarked projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Bookmarked projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookmarks/{projectId}:
    post:
      operationId: addBookmark
      tags: [bookmarks]
      summary: Bookmark a project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: number
      responses:
        "201":
          description: Bookmarked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: removeBookmark
      tags: [bookmarks]
      summary: Remove a bookmark
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Bookmark removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
      required:
        - email
        - password
        - name

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: number
        email:
          type: string
        name:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        githubUrl:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - skills
        - createdAt

    UserProfile:
      type: object
      properties:
        id:
          type: number
        email:
          type: string
        name:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        githubUrl:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required:
        - id
        - email
        - name
        - skills
        - createdAt
        - projects

    UsersListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: number
        page:
          type: number
        limit:
          type: number
      required:
        - users
        - total
        - page
        - limit

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        githubUrl:
          type: string
        skills:
          type: array
          items:
            type: string

    Project:
      type: object
      properties:
        id:
          type: number
        title:
          type: string
        description:
          type: string
        techStack:
          type: array
          items:
            type: string
        teamSize:
          type: number
        status:
          type: string
          enum: [looking_for_team, active, completed]
        githubUrl:
          type: string
          nullable: true
        ownerId:
          type: number
        ownerName:
          type: string
        ownerAvatarUrl:
          type: string
          nullable: true
        memberCount:
          type: number
        isBookmarked:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - techStack
        - teamSize
        - status
        - ownerId
        - ownerName
        - memberCount
        - isBookmarked
        - createdAt

    ProjectDetail:
      type: object
      properties:
        id:
          type: number
        title:
          type: string
        description:
          type: string
        techStack:
          type: array
          items:
            type: string
        teamSize:
          type: number
        status:
          type: string
          enum: [looking_for_team, active, completed]
        githubUrl:
          type: string
          nullable: true
        ownerId:
          type: number
        ownerName:
          type: string
        ownerAvatarUrl:
          type: string
          nullable: true
        memberCount:
          type: number
        isBookmarked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: "#/components/schemas/User"
      required:
        - id
        - title
        - description
        - techStack
        - teamSize
        - status
        - ownerId
        - ownerName
        - memberCount
        - isBookmarked
        - createdAt
        - members

    ProjectsListResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        total:
          type: number
        page:
          type: number
        limit:
          type: number
      required:
        - projects
        - total
        - page
        - limit

    CreateProjectRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        techStack:
          type: array
          items:
            type: string
        teamSize:
          type: number
        status:
          type: string
          enum: [looking_for_team, active, completed]
        githubUrl:
          type: string
      required:
        - title
        - description
        - techStack
        - teamSize
        - status

    UpdateProjectRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        techStack:
          type: array
          items:
            type: string
        teamSize:
          type: number
        status:
          type: string
          enum: [looking_for_team, active, completed]
        githubUrl:
          type: string

    CreateCollaborationRequest:
      type: object
      properties:
        projectId:
          type: number
        message:
          type: string
      required:
        - projectId

    RespondToRequestBody:
      type: object
      properties:
        action:
          type: string
          enum: [accept, reject]
      required:
        - action

    CollaborationRequest:
      type: object
      properties:
        id:
          type: number
        projectId:
          type: number
        requesterId:
          type: number
        message:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - requesterId
        - status
        - createdAt

    CollaborationRequestDetail:
      type: object
      properties:
        id:
          type: number
        projectId:
          type: number
        projectTitle:
          type: string
        requesterId:
          type: number
        requesterName:
          type: string
        requesterAvatarUrl:
          type: string
          nullable: true
        requesterSkills:
          type: array
          items:
            type: string
        message:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - projectTitle
        - requesterId
        - requesterName
        - requesterSkills
        - status
        - createdAt

    Notification:
      type: object
      properties:
        id:
          type: number
        userId:
          type: number
        type:
          type: string
          enum: [collaboration_request, request_accepted, request_rejected, project_invite]
        message:
          type: string
        relatedProjectId:
          type: number
          nullable: true
        relatedProjectTitle:
          type: string
          nullable: true
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - type
        - message
        - isRead
        - createdAt
