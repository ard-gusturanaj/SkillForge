kind = "web"
previewPath = "/"
title = "SkillForge"
version = "1.0.0"
id = "artifacts/skillforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21201
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/skillforge run dev"

[services.env]
PORT = "21201"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/skillforge", "run", "build"]
publicDir = "artifacts/skillforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
